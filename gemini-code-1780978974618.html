<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bản Đồ Điều Hướng Ô Tô Chuyên Nghiệp</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        /* Bảng điều khiển phía dưới giống Google Maps */
        .nav-bottom-panel {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: #ffffff;
            padding: 20px 15px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            display: none;
            box-sizing: border-box;
        }
        .nav-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .time-text { font-size: 24px; font-weight: bold; color: #1a73e8; }
        .sub-text { font-size: 14px; color: #5f6368; margin-top: 4px; }
        
        /* Nút Bắt đầu đi màu xanh công nghệ */
        .btn-start-nav {
            background: #1a73e8; color: white; border: none;
            width: 100%; padding: 14px; border-radius: 25px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 6px rgba(26,115,232,0.3);
            text-align: center;
        }
        .btn-start-nav:active { background: #1557b0; }
        
        /* Trạng thái đang dẫn đường */
        .navigating .btn-start-nav { background: #d93025; } /* Đổi thành nút Dừng */
        
        /* Bảng chỉ đường chữ to phía trên khi đang chạy */
        .top-instruction {
            position: absolute;
            top: 15px; left: 10px; right: 10px;
            background: #137333; color: white;
            padding: 15px; border-radius: 10px;
            font-size: 18px; font-weight: bold;
            z-index: 1000; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: none;
        }
        
        /* Ẩn bớt bảng chỉ đường mặc định của thư viện để nhìn bản đồ cho thoáng */
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

    <div id="top-guide" class="top-instruction">Đang tính toán lộ trình...</div>
    <div id="map"></div>
    
    <div id="bottom-panel" class="nav-bottom-panel">
        <div class="nav-info">
            <div>
                <div id="nav-time" class="time-text">-- phút</div>
                <div id="nav-distance" class="sub-text">Quãng đường: -- km</div>
            </div>
            <div style="text-align: right;">
                <div class="sub-text" style="font-weight: bold; color: #34a853;">Tuyến đường tối ưu</div>
                <div class="sub-text">Né ngõ hẹp ô tô</div>
            </div>
        </div>
        <button id="btn-action" class="btn-start-nav" onclick="toggleNavigation()">BẮT ĐẦU ĐI</button>
    </div>

    <script>
        var map = L.map('map', { zoomControl: false }).setView([13.9824, 108.0016], 14);
        
        // Dùng bản đồ nền sạch, rõ ràng
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var userLocation = null;
        var destination = null;
        var routingControl = null;
        var carMarker = null;
        var isNavigating = false;

        // Cấu hình Marker biểu tượng xe ô tô
        var carIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/8113/8113867.png', // Biểu tượng mũi tên định vị/ô tô
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        // Bật GPS liên tục cao cấp (High Accuracy) giống ứng dụng định vị chuyên dụng
        map.locate({setView: true, maxZoom: 17, watch: true, enableHighAccuracy: true});

        map.on('locationfound', function(e) {
            userLocation = e.latlng;
            
            if (!carMarker) {
                carMarker = L.marker(userLocation, {icon: carIcon}).addTo(map);
            } else {
                carMarker.setLatLng(userLocation);
            }

            // Nếu đang ở chế độ Bắt đầu đi (Navigation), tự động khóa xe ở tâm màn hình
            if (isNavigating) {
                map.setView(userLocation, 18); // Phóng to để nhìn rõ góc cua
                if (e.heading) {
                    // Nếu điện thoại có cảm biến la bàn, xoay bản đồ theo hướng xe chạy
                    map.setBearing(e.heading); 
                }
            }
        });

        // Chọn điểm đến B bằng cách chạm vào màn hình
        map.on('click', function(e) {
            if (isNavigating) return; // Đang chạy định vị thì khóa không cho chọn bậy
            
            destination = e.latlng;
            if (!userLocation) {
                alert("Đang tìm tín hiệu GPS của bạn...");
                return;
            }

            if (routingControl) map.removeControl(routingControl);

            routingControl = L.Routing.control({
                waypoints: [L.latLng(userLocation.lat, userLocation.lng), L.latLng(destination.lat, destination.lng)],
                router: L.Routing.osrmv1({
                    serviceUrl: 'https://router.project-osrm.org/route/v1',
                    profile: 'car' // Thuật toán quét và tự động né hẻm nhỏ ô tô không lọt
                }),
                lineOptions: { styles: [{color: '#1a73e8', weight: 7, opacity: 0.8}] },
                createMarker: function() { return null; } // Ẩn các ghim thừa
            }).addTo(map);

            routingControl.on('routesfound', function(ev) {
                var routes = ev.routes;
                var summary = routes[0].summary;
                
                var distKm = (summary.totalDistance / 1000).toFixed(1);
                var timeMin = Math.round(summary.totalTime / 60);

                document.getElementById('nav-time').innerText = timeMin + " phút";
                document.getElementById('nav-distance').innerText = "Quãng đường: " + distKm + " km";
                document.getElementById('bottom-panel').style.display = 'block';
            });
        });

        // Trạng thái Bắt đầu đi / Dừng lại
        function toggleNavigation() {
            var actionBtn = document.getElementById('btn-action');
            var topGuide = document.getElementById('top-guide');

            if (!isNavigating) {
                // BẮT ĐẦU ĐI
                isNavigating = true;
                document.body.classList.add('navigating');
                actionBtn.innerText = "KẾT THÚC LỘ TRÌNH";
                actionBtn.style.background = "#d93025";
                
                topGuide.innerText = "Đi thẳng theo hướng bản đồ chỉ dẫn";
                topGuide.style.display = 'block';
                
                // Khóa chặt vị trí xe vào tâm màn hình và phóng to
                map.setView(userLocation, 18);
            } else {
                // DỪNG ĐI
                isNavigating = false;
                document.body.classList.remove('navigating');
                actionBtn.innerText = "BẮT ĐẦU ĐI";
                actionBtn.style.background = "#1a73e8";
                topGuide.style.display = 'none';
                document.getElementById('bottom-panel').style.display = 'none';
                
                if (routingControl) map.removeControl(routingControl);
                map.setView(userLocation, 15);
            }
        }

        map.on('locationerror', function() {
            alert("Lỗi: Hãy bật Vị trí (GPS) mức độ 'Chính xác cao' trong cài đặt điện thoại cài cho Chrome/Safari.");
        });
    </script>
</body>
</html>
